# /etc/nginx/sites-available/conradstrong.com
# Conrad Command Center + Brain (uvicorn :8000). TLS via certbot on Ubuntu.
# Primary: conradstrong.com (+ www). Legacy aliases: commandcenter/command.theconradteam.com

server {
    listen 80;
    server_name conradstrong.com www.conradstrong.com commandcenter.theconradteam.com command.theconradteam.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name conradstrong.com www.conradstrong.com commandcenter.theconradteam.com command.theconradteam.com;

    # After: sudo certbot --nginx -d conradstrong.com -d www.conradstrong.com \
    #   -d commandcenter.theconradteam.com -d command.theconradteam.com
    ssl_certificate     /etc/letsencrypt/live/conradstrong.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/conradstrong.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
